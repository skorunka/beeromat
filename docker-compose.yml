# Local dev + test infrastructure.
#
# Per the "prefer local Docker over cloud" preference, this is the
# default backing for every external dependency used in development
# and testing. Production runs against managed Neon (and real
# Resend, Upstash, etc.).
#
# DEV and TEST are fully isolated — two separate databases in one
# Postgres container, each fronted by its own Neon HTTP proxy:
#   - `beeromat`      database  ← neon-proxy      on host port 14444  (dev)
#   - `beeromat_test` database  ← neon-proxy-test on host port 14445  (test)
# A test run truncates `beeromat_test` only; `pnpm dev` data in
# `beeromat` is never touched.
#
# Host ports are deliberately non-default (5432/4444 are image
# defaults) so multiple projects can coexist on one dev machine.
#
# Bring up:   pnpm docker:up
# Tear down:  pnpm docker:down

services:
  postgres:
    image: postgres:17
    container_name: beeromat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: beeromat
      POSTGRES_PASSWORD: beeromat
      POSTGRES_DB: beeromat
    ports:
      # Non-default host port; the app talks via the proxies, this
      # mapping is purely for dev-tool access (psql / Drizzle Studio).
      - '5433:5432'
    volumes:
      - beeromat_pg:/var/lib/postgresql/data
      # Init scripts run once on first start — creates beeromat_test.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Connects to beeromat_test specifically and runs a query — only
      # passes once the init script has created it AND Postgres is
      # accepting real TCP connections. This closes the race where a
      # proxy could start before beeromat_test exists.
      test: ['CMD-SHELL', 'psql -U beeromat -d beeromat_test -c "SELECT 1"']
      interval: 5s
      timeout: 3s
      retries: 15

  # Dev proxy → `beeromat` database. Used by `pnpm dev`.
  neon-proxy:
    # Pinned to a digest (not the mutable :main tag) for reproducible
    # builds. To update: docker pull ...:main, then re-read the digest.
    image: ghcr.io/timowilhelm/local-neon-http-proxy@sha256:cd2ae14edf2feafbc3330492de5c80506f77274c3bd013154cdef697bdeb768a
    container_name: beeromat-neon-proxy
    restart: unless-stopped
    environment:
      PG_CONNECTION_STRING: postgres://beeromat:beeromat@postgres:5432/beeromat
    ports:
      - '14444:4444'
    depends_on:
      postgres:
        condition: service_healthy

  # Test proxy → `beeromat_test` database. Used by `pnpm test:e2e`.
  # Physically separate target DB → a test run can never wipe dev data.
  neon-proxy-test:
    # Pinned to a digest (not the mutable :main tag) for reproducible
    # builds. To update: docker pull ...:main, then re-read the digest.
    image: ghcr.io/timowilhelm/local-neon-http-proxy@sha256:cd2ae14edf2feafbc3330492de5c80506f77274c3bd013154cdef697bdeb768a
    container_name: beeromat-neon-proxy-test
    restart: unless-stopped
    environment:
      PG_CONNECTION_STRING: postgres://beeromat:beeromat@postgres:5432/beeromat_test
    ports:
      - '14445:4444'
    depends_on:
      postgres:
        condition: service_healthy

  # Local SMTP sink. Dev + test email (magic links, invitations) is
  # delivered here instead of to a real provider, so nothing leaves the
  # machine. Browse caught messages at http://localhost:18025.
  # Production sends via real SMTP (Resend's SMTP gateway) — same code
  # path, different SMTP_URL (constitution v1.3.0: configuration not
  # code). Host ports are non-default per the project convention.
  mailpit:
    image: axllent/mailpit:v1.21.8
    container_name: beeromat-mailpit
    restart: unless-stopped
    ports:
      - '11025:1025' # SMTP   — the app connects here
      - '18025:8025' # Web UI — browse caught messages

volumes:
  beeromat_pg:
